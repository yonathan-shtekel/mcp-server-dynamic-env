name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m venv .venv
        . .venv/bin/activate
        pip install -e ".[dev]"
        pip install ruff mypy pytest pytest-cov bandit safety interrogate

    - name: Lint with ruff
      run: |
        . .venv/bin/activate
        .venv/bin/ruff check

    - name: Run tests
      run: |
        . .venv/bin/activate
        .venv/bin/pytest tests/ --cov=src --cov-report=xml

    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
